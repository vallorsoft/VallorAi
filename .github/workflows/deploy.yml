name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  db-migrate:
    name: Apply Prisma Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # NOTE: this replaces the old `prisma db push` step. `db push` has no
      # history and silently drifts from the schema in git; `migrate deploy`
      # only applies committed migrations (packages/database/prisma/migrations/).
      #
      # ONE-TIME MANUAL STEP REQUIRED before this runs against the real DB:
      # the production database already has this schema applied piecemeal via
      # the old `db push` step (including the email-verification columns from
      # #22/#23), so Prisma has no migration history for it yet. Run, in
      # order, by hand, against production (or via the "Baseline Prisma
      # Migrations" manual workflow):
      #   pnpm --filter @ai-home-designer/database exec prisma migrate resolve --applied 20260707052955_init
      #   pnpm --filter @ai-home-designer/database exec prisma migrate resolve --applied 20260707055000_add_email_verification
      # (or run the "Baseline Prisma Migrations" manual workflow for each).
      # Do NOT resolve 20260707060241_add_project_versioning_and_password_reset —
      # those tables are genuinely new and must be created for real by this step.
      # Skipping the two resolves above will make the first `migrate deploy` fail
      # (it will try to re-create tables/columns that already exist).
      - name: Apply migrations to database
        run: pnpm --filter @ai-home-designer/database exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-api:
    name: Deploy API (vallorai-api)
    runs-on: ubuntu-latest
    needs: db-migrate
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy . --config apps/api/fly.toml --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web (vallorai)
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: |
          flyctl deploy . \
            --config apps/web/fly.toml \
            --build-arg NEXT_PUBLIC_API_URL=https://vallorai-api.fly.dev/api/v1 \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

name: Diagnose API

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: API status and logs
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: App status
        run: flyctl status -a vallorai-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Machine list
        run: flyctl machine list -a vallorai-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Secrets list (names only)
        run: flyctl secrets list -a vallorai-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Recent logs (20s capture)
        run: timeout 20 flyctl logs -a vallorai-api || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check from runner
        run: |
          echo "--- GET /api/v1 ---"
          curl -sS -m 30 -o /dev/null -w "HTTP status: %{http_code}, total time: %{time_total}s\n" https://vallorai-api.fly.dev/api/v1 || echo "request failed"
          echo "--- POST /api/v1/auth/register (dummy) ---"
          curl -sS -m 60 -w "\nHTTP status: %{http_code}, total time: %{time_total}s\n" \
            -H "Content-Type: application/json" \
            -H "Origin: https://vallorai.fly.dev" \
            -d '{"email":"diag-test@example.com","name":"Diag Test","password":"testpass1234"}' \
            https://vallorai-api.fly.dev/api/v1/auth/register || echo "request failed"

  ai-chat-check:
    name: AI chat end-to-end check
    runs-on: ubuntu-latest
    env:
      DIAG_EMAIL: ci-diagnostics@vallorai.internal
      DIAG_PASSWORD: CiDiagnostics1234!
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      # Idempotent: fails harmlessly with "Email already registered" on repeat runs.
      - name: Register diagnostics user (idempotent)
        run: |
          curl -sS -m 30 -X POST https://vallorai-api.fly.dev/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$DIAG_EMAIL\",\"name\":\"CI Diagnostics\",\"password\":\"$DIAG_PASSWORD\"}" || true

      - name: Mark diagnostics user as verified
        run: |
          # psql doesn't understand Prisma-only query params like pgbouncer=true.
          PSQL_URL=$(echo "$DATABASE_URL" | sed -E 's/[?&]pgbouncer=[^&]*//')
          psql "$PSQL_URL" -c "UPDATE \"User\" SET \"isVerified\" = true WHERE email = '${DIAG_EMAIL}';"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Login and create a diagnostics project
        id: setup
        run: |
          LOGIN=$(curl -sS -m 30 -X POST https://vallorai-api.fly.dev/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$DIAG_EMAIL\",\"password\":\"$DIAG_PASSWORD\"}")
          TOKEN=$(echo "$LOGIN" | grep -o '"accessToken":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$TOKEN" ]; then echo "Login failed: $LOGIN"; exit 1; fi
          echo "$TOKEN" > token.txt

          PROJECT=$(curl -sS -m 30 -X POST https://vallorai-api.fly.dev/api/v1/projects \
            -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"CI AI Diagnostics","type":"FAMILY_HOUSE"}')
          PROJECT_ID=$(echo "$PROJECT" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$PROJECT_ID" ]; then echo "Project creation failed: $PROJECT"; exit 1; fi
          echo "$PROJECT_ID" > project_id.txt

      - name: Call AI chat endpoint
        run: |
          TOKEN=$(cat token.txt)
          PROJECT_ID=$(cat project_id.txt)
          echo "--- POST /ai/projects/$PROJECT_ID/chat ---"
          curl -sS -m 60 -w "\nHTTP status: %{http_code}, total time: %{time_total}s\n" \
            -X POST "https://vallorai-api.fly.dev/api/v1/ai/projects/$PROJECT_ID/chat" \
            -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
            -d '{"message":"Salut, vreau o casa mica cu 2 camere.","language":"ro"}' || echo "request failed"

      - name: Recent logs right after the chat call (20s capture)
        run: timeout 20 flyctl logs -a vallorai-api || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
